<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WG Circular Business Park - PV Monitoring Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#0f1419;color:#e2e8f0;min-height:100vh;padding:20px}
.container{max-width:1600px;margin:0 auto}
.header{text-align:center;margin-bottom:30px}
.header h1{font-size:2rem;margin-bottom:8px;color:#fff;font-weight:500}
.last-updated{color:#64748b;font-size:0.85rem}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:30px}
.stat-card{background:linear-gradient(135deg,#1a2332,#1e2936);border-radius:12px;padding:20px 25px;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
.stat-label{color:#9ca3af;font-size:0.7rem;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;font-weight:500}
.stat-value{font-size:2.8rem;font-weight:700;margin-bottom:8px;line-height:1}
.stat-value.ok{color:#22c55e}.stat-value.low{color:#fb923c}.stat-value.offline{color:#6b7280}
.stat-sublabel{color:#6b7280;font-size:0.85rem}
.chart-section{background:linear-gradient(135deg,#1a2332,#1e2936);border-radius:16px;padding:30px;margin-bottom:25px;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:15px}
.chart-title{font-size:1.3rem;font-weight:600;color:#fff}
.chart-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.toggle-btn{padding:8px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(15,20,25,0.4);color:#9ca3af;cursor:pointer;font-size:0.85rem;font-weight:500;transition:all 0.3s}
.toggle-btn:hover{background:rgba(59,130,246,0.2);border-color:#3b82f6;color:#60a5fa}
.toggle-btn.active{background:#3b82f6;border-color:#3b82f6;color:#fff}
.chart-container{position:relative;height:400px}
.export-btn{padding:8px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(15,20,25,0.4);color:#60a5fa;cursor:pointer;font-size:0.8rem;font-weight:500;transition:all 0.3s}
.export-btn:hover{background:rgba(59,130,246,0.2);border-color:#3b82f6}
/* Daily History section */
.history-section{background:linear-gradient(135deg,#1a2332,#1e2936);border-radius:16px;padding:30px;margin-bottom:25px;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.date-nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.date-nav button{background:rgba(15,20,25,0.4);border:1px solid rgba(255,255,255,0.1);color:#9ca3af;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:0.8rem;transition:all 0.2s}
.date-nav button:hover{background:rgba(59,130,246,0.2);color:#60a5fa;border-color:#3b82f6}
.date-nav select{background:rgba(15,20,25,0.8);border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:#e2e8f0;padding:6px 10px;font-size:0.85rem;cursor:pointer}
.hourly-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:20px}
.hourly-day-card{background:rgba(10,15,26,0.4);border-radius:10px;padding:12px;border:1px solid rgba(255,255,255,0.06)}
.hourly-day-title{font-size:0.75rem;color:#9ca3af;margin-bottom:8px;font-weight:600}
.hourly-day-chart{height:180px;position:relative}
.loading{text-align:center;padding:60px;font-size:1.2rem;color:#94a3b8}
@media(max-width:768px){.chart-container{height:300px}}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 id="siteName">WG Circular Business Park</h1>
        <div class="last-updated" id="lastUpdated">Loading...</div>
    </div>
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total Generation Today</div><div class="stat-value ok" id="totalKwh">-- kWh</div><div class="stat-sublabel" id="statusLabel">Loading...</div></div>
        <div class="stat-card"><div class="stat-label">Rolling Daily Average</div><div class="stat-value" id="avgKwh" style="color:#fff">-- kWh</div><div class="stat-sublabel" id="avgSublabel">Typical day performance</div></div>
        <div class="stat-card"><div class="stat-label">Last Hour Updated</div><div class="stat-value" id="lastHour" style="color:#fff">--:00</div><div class="stat-sublabel" id="lastHourKwh">-- kW generated</div></div>
        <div class="stat-card"><div class="stat-label">Status</div><div class="stat-value ok" id="status">--</div><div class="stat-sublabel" id="statusDetail">--</div></div>
    </div>

    <!-- Hourly Generation Chart -->
    <div class="chart-section">
        <div class="chart-header">
            <div class="chart-title">Hourly Generation</div>
            <div class="chart-controls">
                <button class="toggle-btn active" onclick="switchMain('today',this)">Today</button>
                <button class="toggle-btn" onclick="switchMain('average',this)">30-Day Average</button>
                <button class="export-btn" onclick="exportCSV()">Export CSV</button>
            </div>
        </div>
        <div class="chart-container"><canvas id="mainChart"></canvas></div>
    </div>

    <!-- Daily History Section -->
    <div class="history-section">
        <div class="chart-header">
            <div class="chart-title">Daily History</div>
            <div class="chart-controls">
                <div class="date-nav">
                    <button onclick="histBack()">◀</button>
                    <select id="histDay"></select>
                    <select id="histMonth"></select>
                    <select id="histYear"></select>
                    <button onclick="histForward()">▶</button>
                    <button onclick="goToHistDate()" style="background:#3b82f6;color:#fff;border-color:#3b82f6">View</button>
                </div>
            </div>
        </div>
        <!-- Daily totals bar chart -->
        <div class="chart-container" style="height:300px"><canvas id="historyChart"></canvas></div>

        <!-- Hourly breakdown cards for recent days -->
        <div style="margin-top:20px">
            <div class="chart-header">
                <div class="chart-title" style="font-size:1rem">Hourly Breakdown by Day</div>
                <div class="chart-controls">
                    <button class="toggle-btn active" id="hourlyToday" onclick="switchHourlyMode('today')">Today View</button>
                    <button class="toggle-btn" id="hourlyAvg" onclick="switchHourlyMode('average')">30-Day Avg View</button>
                </div>
            </div>
            <div class="hourly-grid" id="hourlyGrid"></div>
        </div>
    </div>

    <div id="dataLoading" class="loading">Loading data...</div>
</div>
<script>
const SITE_CONFIG={name:"WG Circular Business Park",dataUrl:"./data/processed.json"};
let D=null,mainChart=null,historyChart=null,mainMode='today',hourlyMode='today';
let hourlyCharts={};
Chart.defaults.devicePixelRatio=window.devicePixelRatio*2||2;

loadData();setInterval(loadData,3600000);

async function loadData(){
    try{const r=await fetch(SITE_CONFIG.dataUrl);if(!r.ok)throw new Error('Failed');D=await r.json();document.getElementById('dataLoading').style.display='none';updateDashboard();updateMainChart();updateHistory()}
    catch(e){document.getElementById('dataLoading').innerHTML=`<div style="color:#ef4444">Error: ${e.message}</div>`}
}

function fmt(n,d=1){const f=Number(n).toFixed(d);const[i,dec]=f.split('.');return i.replace(/\B(?=(\d{3})+(?!\d))/g,' ')+(dec!==undefined?'.'+dec:'')}

function updateDashboard(){
    const stats=D.stats_30day||{};
    document.getElementById('siteName').textContent=SITE_CONFIG.name;
    document.getElementById('lastUpdated').textContent=`Updated ${D.last_updated||'N/A'}`;
    const t=D.total_kwh||0,a=stats.daily_avg||0,sd=stats.sample_days||0,st=D.status||'offline';
    document.getElementById('totalKwh').textContent=fmt(t)+' kWh';
    document.getElementById('totalKwh').className=`stat-value ${st}`;
    document.getElementById('avgKwh').textContent=fmt(a)+' kWh';
    document.getElementById('avgSublabel').textContent=sd>0?`Based on ${sd} days of data`:'Collecting data...';
    const td=D.today||{},hp=td.hourly_pv||D.hourly_pv||[],lh=D.last_hour;
    const ls=(lh!==undefined&&lh!==null)?lh:'--';
    const lv=ls!=='--'?(hp[parseInt(ls)]||0):0;
    document.getElementById('lastHour').textContent=(ls!=='--'?String(ls).padStart(2,'0'):'--')+':00';
    document.getElementById('lastHourKwh').textContent=fmt(lv)+' kW generated';
    document.getElementById('status').textContent=st.toUpperCase();
    document.getElementById('status').className=`stat-value ${st}`;
    const pct=a>0?((t/a)*100).toFixed(0):0;
    document.getElementById('statusLabel').textContent=a>0?`${pct}% of daily average`:'Collecting baseline data...';
    document.getElementById('statusDetail').textContent=st==='ok'?'Generating normally':st==='low'?'Below expected generation':'No recent data';
}

function trunc(arr){let l=0;for(let i=arr.length-1;i>=0;i--){if(arr[i]>0){l=i;break}}return arr.map((v,i)=>i<=l?v:null)}

function updateMainChart(){
    const hours=Array.from({length:24},(_,i)=>i);
    const labels=hours.map(h=>(h<10?'0':'')+h+':00');
    const td=D.today||{},hp=td.hourly_pv||D.hourly_pv||new Array(24).fill(0);
    const ir=td.irradiation||D.irradiation||new Array(24).fill(0);
    const stats=D.stats_30day||{};
    const ctx=document.getElementById('mainChart').getContext('2d');
    if(mainChart)mainChart.destroy();

    let data,opts;
    if(mainMode==='today'){
        data={labels,datasets:[
            {type:'line',label:'Irradiation (W/m²)',data:ir,backgroundColor:'rgba(133,77,14,0.5)',borderColor:'rgba(202,138,4,0.8)',borderWidth:1,fill:true,yAxisID:'y1',pointRadius:0,tension:0.4,order:3},
            {type:'line',label:'Predicted (Rolling Avg)',data:stats.hourly_avg||new Array(24).fill(0),borderColor:'rgba(96,165,250,0.7)',borderWidth:2,borderDash:[6,4],fill:false,pointRadius:0,tension:0.4,order:2},
            {type:'bar',label:'PV Generation (kW)',data:hp,backgroundColor:'#22c55e',borderWidth:0,barPercentage:0.9,categoryPercentage:0.95,order:1}
        ]};
        opts=buildOpts(true);
    } else {
        data={labels,datasets:[
            {type:'line',label:'Min',data:stats.hourly_min||new Array(24).fill(0),backgroundColor:'rgba(120,80,40,0.12)',borderColor:'rgba(180,140,60,0.8)',borderWidth:1.5,fill:'+1',pointRadius:0,tension:0.4,order:5},
            {type:'line',label:'Max',data:stats.hourly_max||new Array(24).fill(0),backgroundColor:'transparent',borderColor:'rgba(150,100,220,0.8)',borderWidth:1.5,pointRadius:0,tension:0.4,order:5},
            {type:'line',label:'P25-P75',data:stats.hourly_p25||new Array(24).fill(0),backgroundColor:'rgba(34,197,94,0.2)',borderColor:'rgba(34,197,94,0.5)',borderWidth:1.5,fill:'+1',pointRadius:0,tension:0.4,order:3},
            {type:'line',label:'',data:stats.hourly_p75||new Array(24).fill(0),backgroundColor:'transparent',borderColor:'rgba(34,197,94,0.5)',borderWidth:1.5,pointRadius:0,tension:0.4,order:3},
            {type:'line',label:'Median (P50)',data:stats.hourly_avg||new Array(24).fill(0),borderColor:'#60a5fa',borderWidth:2.5,borderDash:[8,4],fill:false,pointRadius:0,tension:0.4,order:2},
            // Solid green line for today PV
            {type:'line',label:'Today Actual',data:trunc(hp),borderColor:'#22c55e',borderWidth:2,fill:false,pointRadius:0,tension:0.4,order:1}
        ]};
        opts=buildOpts(false);
    }
    mainChart=new Chart(ctx,{type:'bar',data,options:opts});
}

function buildOpts(showIrrad,isHist=false){
    const o={responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:true,position:'top',align:'center',labels:{color:'#9ca3af',font:{size:12},usePointStyle:true,padding:12,filter:i=>i.text!==''}},
            tooltip:{backgroundColor:'rgba(15,20,25,0.95)',titleColor:'#e2e8f0',bodyColor:'#cbd5e1',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,padding:10,displayColors:true,filter:i=>i.dataset.label!==''}},
        scales:{x:{grid:{color:'rgba(255,255,255,0.05)',drawBorder:false},ticks:{color:'#6b7280',font:{size:11},maxRotation:isHist?45:0}},
            y:{beginAtZero:true,position:'left',grid:{color:'rgba(255,255,255,0.05)',drawBorder:false},ticks:{color:'#6b7280',font:{size:11},callback:v=>v.toFixed(0)+(isHist?'':' kW')},title:{display:true,text:isHist?'Energy (kWh)':'Power (kW)',color:'#9ca3af',font:{size:10}}}}};
    if(showIrrad)o.scales.y1={beginAtZero:true,position:'right',grid:{drawOnChartArea:false},ticks:{color:'#ca8a04',font:{size:11},callback:v=>v.toFixed(0)},title:{display:true,text:'Irradiation (W/m²)',color:'#ca8a04',font:{size:10}}};
    return o;
}

function switchMain(mode,btn){mainMode=mode;document.querySelectorAll('.chart-section .toggle-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');updateMainChart()}

// ── Daily History ──────────────────────────────────────────
function updateHistory(){
    const history=D.history||{};
    const dates=Object.keys(history).sort();
    if(!dates.length)return;
    populateDateSelectors(dates);
    drawHistoryChart(dates,history);
    drawHourlyGrid(dates,history);
}

function populateDateSelectors(dates){
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const latest=dates[dates.length-1];
    const ay=[...new Set(dates.map(d=>d.slice(0,4)))].sort();
    const ys=document.getElementById('histYear'),ms=document.getElementById('histMonth'),ds=document.getElementById('histDay');

    ys.innerHTML=ay.map(y=>`<option value="${y}" ${y===latest.slice(0,4)?'selected':''}>${y}</option>`).join('');

    function uM(){const yr=ys.value;const am=[...new Set(dates.filter(d=>d.startsWith(yr)).map(d=>parseInt(d.slice(5,7))))].sort((a,b)=>a-b);ms.innerHTML=am.map(m=>`<option value="${m}" ${m===parseInt(latest.slice(5,7))?'selected':''}>${months[m-1]}</option>`).join('');uD()}
    function uD(){const yr=ys.value,mo=String(ms.value).padStart(2,'0'),pf=yr+'-'+mo;const ad=dates.filter(d=>d.startsWith(pf)).map(d=>parseInt(d.slice(8,10))).sort((a,b)=>a-b);const ld=parseInt(latest.slice(8,10));ds.innerHTML=ad.map(d=>`<option value="${d}" ${d===ld?'selected':''}>${d}</option>`).join('')}
    ys.onchange=uM;ms.onchange=uD;uM();
}

function getSelectedHistDate(){
    return document.getElementById('histYear').value+'-'+String(document.getElementById('histMonth').value).padStart(2,'0')+'-'+String(document.getElementById('histDay').value).padStart(2,'0');
}

function goToHistDate(){
    const ds=getSelectedHistDate();
    const history=D.history||{};
    if(!history[ds]){alert('No data for '+ds);return}
    // Switch main chart to show this date
    mainMode='pastday';
    document.querySelectorAll('.chart-section .toggle-btn').forEach(b=>b.classList.remove('active'));
    drawPastDay(ds);
}

function histBack(){
    const history=D.history||{};
    const dates=Object.keys(history).sort();
    const cur=getSelectedHistDate();
    const idx=dates.indexOf(cur);
    if(idx>0){setDateSelector(dates[idx-1]);goToHistDate()}
}
function histForward(){
    const history=D.history||{};
    const dates=Object.keys(history).sort();
    const cur=getSelectedHistDate();
    const idx=dates.indexOf(cur);
    if(idx<dates.length-1){setDateSelector(dates[idx+1]);goToHistDate()}
}
function setDateSelector(dateStr){
    document.getElementById('histYear').value=dateStr.slice(0,4);
    document.getElementById('histYear').onchange();
    document.getElementById('histMonth').value=parseInt(dateStr.slice(5,7));
    document.getElementById('histMonth').onchange();
    document.getElementById('histDay').value=parseInt(dateStr.slice(8,10));
}

function drawPastDay(dateStr){
    const history=D.history||{};
    const dd=history[dateStr];if(!dd)return;
    const hours=Array.from({length:24},(_,i)=>i);
    const labels=hours.map(h=>(h<10?'0':'')+h+':00');
    const stats=D.stats_30day||{};
    const ctx=document.getElementById('mainChart').getContext('2d');
    if(mainChart)mainChart.destroy();
    const dh=dd.hourly||new Array(24).fill(0);
    const di=dd.irradiation||new Array(24).fill(0);
    const dt=new Date(dateStr+'T00:00:00');
    const dl=dt.toLocaleDateString('en-ZA',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
    mainChart=new Chart(ctx,{type:'bar',data:{labels,datasets:[
        {type:'line',label:'Irradiation (W/m²)',data:di,backgroundColor:'rgba(133,77,14,0.5)',borderColor:'rgba(202,138,4,0.8)',borderWidth:1,fill:true,yAxisID:'y1',pointRadius:0,tension:0.4,order:3},
        {type:'line',label:'Rolling Avg',data:stats.hourly_avg||new Array(24).fill(0),borderColor:'rgba(96,165,250,0.7)',borderWidth:2,borderDash:[6,4],fill:false,pointRadius:0,tension:0.4,order:2},
        {type:'bar',label:dl+' (kW)',data:dh,backgroundColor:'#22c55e',borderWidth:0,barPercentage:0.9,categoryPercentage:0.95,order:1}
    ]},options:buildOpts(true)});
}

function drawHistoryChart(dates,history){
    const stats=D.stats_30day||{};
    const dailyAvg=stats.daily_avg||0;
    const totals=dates.map(d=>history[d].total_kwh||0);
    // Sum irradiation per day
    const irradTotals=dates.map(d=>(history[d].irradiation||[]).reduce((a,b)=>a+b,0));
    const maxIrr=Math.max(...irradTotals,1);

    const ctx=document.getElementById('historyChart').getContext('2d');
    if(historyChart)historyChart.destroy();

    historyChart=new Chart(ctx,{type:'bar',data:{
        labels:dates.map(d=>{const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-ZA',{day:'numeric',month:'short'})}),
        datasets:[
            // Irradiation as yellow line
            {type:'line',label:'Irradiation (W/m²)',data:irradTotals,borderColor:'#eab308',borderWidth:1.5,fill:false,pointRadius:2,pointBackgroundColor:'#eab308',yAxisID:'y1',tension:0,order:1},
            {type:'line',label:'Rolling Avg',data:new Array(dates.length).fill(dailyAvg),borderColor:'rgba(96,165,250,0.6)',borderWidth:2,borderDash:[6,4],fill:false,pointRadius:0,order:2},
            {type:'bar',label:'Daily Total (kWh)',data:totals,backgroundColor:totals.map(v=>v<dailyAvg*0.5?'#fb923c':'#22c55e'),borderWidth:0,barPercentage:0.8,categoryPercentage:0.9,order:3}
        ]
    },options:{...buildOpts(false,true),scales:{...buildOpts(false,true).scales,y1:{beginAtZero:true,position:'right',grid:{drawOnChartArea:false},ticks:{color:'#ca8a04',font:{size:10}},title:{display:true,text:'Irradiation (W/m²)',color:'#ca8a04',font:{size:10}}}}}});
}

// ── Hourly Breakdown Grid ──────────────────────────────────
let hourlyGridMode='today';
function switchHourlyMode(mode){
    hourlyGridMode=mode;
    document.getElementById('hourlyToday').classList.toggle('active',mode==='today');
    document.getElementById('hourlyAvg').classList.toggle('active',mode==='average');
    const history=D.history||{};
    const dates=Object.keys(history).sort();
    drawHourlyGrid(dates,history);
}

function drawHourlyGrid(dates,history){
    const grid=document.getElementById('hourlyGrid');
    grid.innerHTML='';
    Object.values(hourlyCharts).forEach(c=>c.destroy());
    hourlyCharts={};

    // Show last 7 days (most recent first)
    const recent=dates.slice(-7).reverse();
    const stats=D.stats_30day||{};

    recent.forEach(dateStr=>{
        const dd=history[dateStr];if(!dd)return;
        const dt=new Date(dateStr+'T00:00:00');
        const label=dt.toLocaleDateString('en-ZA',{weekday:'short',day:'numeric',month:'short'});
        const total=dd.total_kwh||0;
        const cid=`hg-${dateStr}`;

        const card=document.createElement('div');
        card.className='hourly-day-card';
        card.innerHTML=`<div class="hourly-day-title">${label} — ${fmt(total)} kWh</div><div class="hourly-day-chart"><canvas id="${cid}"></canvas></div>`;
        grid.appendChild(card);

        setTimeout(()=>{
            const canvas=document.getElementById(cid);if(!canvas)return;
            const ctx=canvas.getContext('2d');
            const hours=Array.from({length:24},(_,i)=>i);
            const labels=hours.map(h=>(h<10?'0':'')+h+':00');
            const hp=dd.hourly||new Array(24).fill(0);
            const ir=dd.irradiation||new Array(24).fill(0);

            let datasets;
            if(hourlyGridMode==='today'){
                datasets=[
                    {type:'line',label:'Irrad',data:ir,backgroundColor:'rgba(133,77,14,0.4)',borderColor:'rgba(202,138,4,0.7)',borderWidth:0.5,fill:true,yAxisID:'y1',pointRadius:0,tension:0.4,order:3},
                    {type:'line',label:'Avg',data:stats.hourly_avg||new Array(24).fill(0),borderColor:'rgba(96,165,250,0.5)',borderWidth:1,borderDash:[3,2],fill:false,pointRadius:0,tension:0.4,order:2},
                    {type:'bar',label:'PV',data:hp,backgroundColor:'#22c55e',borderWidth:0,barPercentage:0.85,categoryPercentage:0.9,order:1}
                ];
            } else {
                datasets=[
                    {type:'line',data:stats.hourly_p25||new Array(24).fill(0),backgroundColor:'rgba(34,197,94,0.15)',borderColor:'rgba(34,197,94,0.3)',borderWidth:0.5,fill:'+1',pointRadius:0,tension:0.4,order:4},
                    {type:'line',data:stats.hourly_p75||new Array(24).fill(0),backgroundColor:'transparent',borderColor:'rgba(34,197,94,0.3)',borderWidth:0.5,pointRadius:0,tension:0.4,order:4},
                    {type:'line',label:'Avg',data:stats.hourly_avg||new Array(24).fill(0),borderColor:'#60a5fa',borderWidth:1,borderDash:[3,2],fill:false,pointRadius:0,tension:0.4,order:2},
                    // Solid green line
                    {type:'line',label:'PV',data:hp,borderColor:'#22c55e',borderWidth:1.5,fill:false,pointRadius:0,tension:0.4,order:1}
                ];
            }

            const maxIr=Math.max(...ir,1);
            hourlyCharts[cid]=new Chart(ctx,{type:'bar',data:{labels,datasets},options:{
                responsive:true,maintainAspectRatio:false,
                plugins:{legend:{display:false},tooltip:{enabled:false}},
                scales:{
                    x:{grid:{display:false},ticks:{color:'#4b5563',font:{size:7},maxTicksLimit:6}},
                    y:{beginAtZero:true,grid:{color:'rgba(148,163,184,0.05)'},ticks:{color:'#4b5563',font:{size:7},maxTicksLimit:3}},
                    ...(hourlyGridMode==='today'?{y1:{beginAtZero:true,display:false,max:maxIr/0.7}}:{})
                }
            }});
        },50);
    });
}

function exportCSV(){
    const h=D.history||{},stats=D.stats_30day||{},d=Object.keys(h).sort();
    if(!d.length){alert('No data');return}
    let csv='Date,Hour,PV_kWh,Irradiation_Wm2,Rolling_Avg_kW,Daily_Total_kWh\n';
    for(const dt of d){const dd=h[dt],hr=dd.hourly||[],ir=dd.irradiation||[],av=stats.hourly_avg||[];
    for(let i=0;i<24;i++){csv+=`${dt},${String(i).padStart(2,'0')}:00,${(hr[i]||0).toFixed(2)},${(ir[i]||0).toFixed(1)},${(av[i]||0).toFixed(2)},${i===0?(dd.total_kwh||0).toFixed(1):''}\n`}}
    const b=new Blob([csv],{type:'text/csv'}),u=URL.createObjectURL(b),a=document.createElement('a');
    a.href=u;a.download='WG_Circular_Business_Park_hourly_data.csv';a.click();URL.revokeObjectURL(u);
}
</script>
