name: Scrape and Process GoodWe Sites Data

on:
  schedule:
    - cron: '5 3-19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas openpyxl requests
          python -m playwright install chromium
          timeout 120 python -m playwright install-deps || echo "⚠️ install-deps timed out — trying apt fallback..."
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=30 2>/dev/null || true
          sudo apt-get install -y --no-install-recommends libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64 libxshmfence1 2>/dev/null || sudo apt-get install -y --no-install-recommends libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2 libxshmfence1 2>/dev/null || true

      - name: Run GoodWe scraper (attempt 1)
        id: scrape1
        continue-on-error: true
        env:
          GOODWE_USERNAME: ${{ secrets.GOODWE_USERNAME }}
          GOODWE_PASSWORD: ${{ secrets.GOODWE_PASSWORD }}
        run: python download_goodwe_report.py

      - name: Wait before retry
        if: steps.scrape1.outcome == 'failure'
        run: echo "⏳ First attempt failed — waiting 60s before retry..." && sleep 60

      - name: Run GoodWe scraper (attempt 2)
        if: steps.scrape1.outcome == 'failure'
        id: scrape2
        continue-on-error: true
        env:
          GOODWE_USERNAME: ${{ secrets.GOODWE_USERNAME }}
          GOODWE_PASSWORD: ${{ secrets.GOODWE_PASSWORD }}
        run: python download_goodwe_report.py

      - name: Wait before retry 2
        if: steps.scrape1.outcome == 'failure' && steps.scrape2.outcome == 'failure'
        run: echo "⏳ Second attempt failed — waiting 120s before final retry..." && sleep 120

      - name: Run GoodWe scraper (attempt 3)
        if: steps.scrape1.outcome == 'failure' && steps.scrape2.outcome == 'failure'
        env:
          GOODWE_USERNAME: ${{ secrets.GOODWE_USERNAME }}
          GOODWE_PASSWORD: ${{ secrets.GOODWE_PASSWORD }}
        run: python download_goodwe_report.py

      - name: Process all sites
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python process_all_sites.py

      - name: Commit and push data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add sites/*/data/*.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update GoodWe sites data - $(date +'%Y-%m-%d %H:%M UTC')" && git pull --rebase && git push)
