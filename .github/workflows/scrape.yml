name: Scrape and Process GoodWe Sites Data

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas openpyxl requests
          python -m playwright install chromium
          python -m playwright install-deps

      - name: Run GoodWe scraper
        env:
          GOODWE_USERNAME: ${{ secrets.GOODWE_USERNAME }}
          GOODWE_PASSWORD: ${{ secrets.GOODWE_PASSWORD }}
        run: python download_goodwe_report.py

      - name: Process all sites
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python process_all_sites.py

      - name: Commit and push data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add sites/*/data/*.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update GoodWe sites data - $(date +'%Y-%m-%d %H:%M UTC')" && git pull --rebase && git push)
